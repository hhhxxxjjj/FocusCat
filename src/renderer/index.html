<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; script-src 'self';" />
  <title>Committen</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="cat" class="cat">
    <!-- 饱腹感血条 + 数字(顶部居中) -->
    <div class="cat-hunger" id="catHunger" data-level="full">
      <div class="cat-hunger-bar">
        <div class="cat-hunger-fill" id="hungerFill"></div>
      </div>
      <div class="cat-hunger-num" id="hungerNum">--</div>
    </div>

    <div class="cat-sprite-wrapper">
      <div class="cat-sprite-pacer">
        <div class="cat-sprite cat-sprite--idle" id="catSprite"></div>
      </div>
    </div>
    <div class="cat-hint" id="catHint">Drag to move · ⚙ for actions</div>

    <!-- 唯一可见按钮:settings 齿轮(右上) -->
    <button class="cat-ctrl cat-ctrl--menu" id="btnMenu" title="Menu">⚙</button>

    <!-- 弹出菜单(默认隐藏) -->
    <div class="cat-menu" id="catMenu" hidden>
      <button class="cat-menu-item" id="menuReset">
        <span class="cat-menu-icon">⌂</span>
        <span>Reset position</span>
      </button>
      <button class="cat-menu-item" id="menuConfig">
        <span class="cat-menu-icon">📝</span>
        <span>Open config</span>
      </button>
      <div class="cat-menu-divider"></div>
      <button class="cat-menu-item cat-menu-item--danger" id="menuQuit">
        <span class="cat-menu-icon">✕</span>
        <span>Quit Committen</span>
      </button>
    </div>
  </div>

  <script src="cat.js"></script>
</body>
</html>
